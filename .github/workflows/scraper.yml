name: IPTV Link Scraper

on:
  schedule:
    - cron: '0 10 * * *'  # Tous les jours à 10h UTC
    - cron: '0 18 * * *'  # Tous les jours à 18h UTC
  workflow_dispatch:

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Nécessaire pour pousser les commits

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: pip install requests beautifulsoup4

    - name: Run scraper script
      run: python scraper.py

    - name: Show pp.txt content
      run: cat pp.txt

    - name: Commit and push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add pp.txt
        git diff --cached --quiet || git commit -m "Update IPTV link"
        git push
